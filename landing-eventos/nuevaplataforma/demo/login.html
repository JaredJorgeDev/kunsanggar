<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Acceso demo | Kunsang Gar México</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <a class="brand" href="index.html"><img src="../kunsaanglogo.jpg" alt="Kunsang Gar México"><span>Kunsang Gar México</span></a>
      <span class="eyebrow">Área privada demo</span>
      <h1>Acceso a la plataforma</h1>
      <p>No hay autenticación real. Esta pantalla simula inicio de sesión, registro y recuperación.</p>
      <div class="tabs" role="tablist"><button class="tab is-active" type="button" data-mode="login">Entrar</button><button class="tab" type="button" data-mode="registro">Registro</button><button class="tab" type="button" data-mode="recuperar">Recuperar</button></div>
      <form id="login-form">
        <div class="field"><label for="email">Correo</label><input id="email" type="email" placeholder="correo@ejemplo.com" required></div>
        <div class="field"><label for="password">Contraseña</label><input id="password" type="password" placeholder="••••••••" required></div>
        <button class="btn" type="submit">Continuar demo</button>
        <p id="login-message" role="status" aria-live="polite"></p>
      </form>
      <p><a href="index.html">Volver a la demo pública</a></p>
    </section>
  </main>
  <script src="script.js"></script>
</body></html>
